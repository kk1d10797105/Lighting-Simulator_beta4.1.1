<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照明練習ツール(beta) — ETC Element 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&display=swap');

:root {
  --bg:      #0c0c0c;
  --panel:   #aaaaaa8c;
  --panel-ed:#666666;
  --sw-bg:   #000000;
  --sw-txt:  #f8f8f8;
  --bo-col:  #F33F3F;
  --fl-col:  #2A56FF;
  --ok-col:  #4CC64E;
  --amber:   #E8A030;
  --mono:    'Share Tech Mono', monospace;
  --sans:    'Noto Sans JP', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:#222;font-family:var(--sans);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:10px 12px 20px;gap:10px;
}

/* ── HEADER ── */
.hdr{width:100%;max-width:1380px;display:flex;align-items:center;gap:10px;padding-bottom:6px;border-bottom:1px solid #333;}
.hdr-title{font-family:var(--mono);font-size:.9rem;color:var(--amber);letter-spacing:.18em;}
.hdr-badge{font-family:var(--mono);font-size:.55rem;color:#ffffff5f;border:1px solid #333;padding:2px 7px;border-radius:2px;}
.hdr-badge.g{color:var(--ok-col);border-color:#1a3a1a;}

/* ── STAGE SECTION ── */
.stage-section{
  /* Narrower: use max-width less than full */
  width:100%;max-width:1000px;
  background:#181818;border:1px solid #282828;border-radius:4px;padding:8px;
}
.sec-lbl{font-family:var(--mono);font-size:.55rem;color:#444;letter-spacing:.22em;text-transform:uppercase;margin-bottom:6px;}

.stage-layout{
  display:grid;
  grid-template-columns:72px 1fr 72px;
  grid-template-rows:58px 190px 58px;
  gap:4px;
}
.s-top  {grid-column:2/3;grid-row:1/2;}
.s-left {grid-column:1/2;grid-row:2/3;}
.s-mid  {grid-column:2/3;grid-row:2/3;position:relative;}
.s-right{grid-column:3/4;grid-row:2/3;}
.s-bot  {grid-column:2/3;grid-row:3/4;}

.s-top,.s-bot,.s-left,.s-right{
  background:#111;border:1px solid #1e1e1e;border-radius:3px;
  display:flex;align-items:center;justify-content:center;gap:4px;padding:4px;
}
.s-left,.s-right{flex-direction:column;gap:5px;}

.fdot{
  width:25px;height:25px;border-radius:50%;
  border:2px solid #2a2a2a;background:#0e0e0e;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:.5rem;color:#3a3a3a;
  flex-shrink:0;user-select:none;
  transition:border-color .15s,box-shadow .15s,color .15s;
}
.fdot.lit  {border-color:#cc9020;color:#aa7010;box-shadow:0 0 8px 2px rgba(200,150,20,.5);}
.fdot.lit-w{border-color:#9090cc;color:#7070aa;box-shadow:0 0 8px 2px rgba(160,160,240,.4);}
.fdot.lit-s{border-color:#5588ee;color:#4466cc;box-shadow:0 0 7px 2px rgba(80,120,220,.4);}
.side-pair{display:flex;gap:3px;}

#stage-canvas{width:100%;height:100%;display:block;background:#050508;border-radius:2px;}

/* ── BOTTOM: single big panel ── */
.ctrl-panel{
  width:100%;max-width:1380px;
  background:var(--panel);
  border:3px solid var(--panel-ed);border-radius:6px;
  padding:10px 10px 8px;
  box-shadow:0 6px 24px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.15);
  display:flex;flex-direction:column;gap:6px;
}
.panel-nm{font-family:var(--mono);font-size:.55rem;color:var(--sw-bg);opacity:.4;text-align:right;letter-spacing:.15em;}

/* fader rows area + command area side by side */
.panel-inner{display:flex;gap:10px;align-items:flex-start;}
.fader-side{flex:1;display:flex;flex-direction:column;gap:5px;}
.cmd-side{
  width:320px;flex-shrink:0;
  display:flex;flex-direction:column;gap:5px;
  background:rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.18);border-radius:4px;
  padding:8px;
}

/* ── COMMAND VIEWER (inside panel, above numpad) ── */
.cmd-bar{
  background:var(--sw-bg);border:1px solid #2a2a2a;border-radius:3px;
  padding:5px 8px;
  font-family:var(--mono);font-size:.65rem;color:var(--ok-col);
  letter-spacing:.08em;min-height:24px;
  display:flex;align-items:center;gap:3px;flex-wrap:wrap;
  margin-bottom:4px;
}
.cmd-bar .ph{color:#2a2a2a;}
.stok{padding:1px 4px;border-radius:2px;font-size:.6rem;}
.stok.n{background:#0a1820;color:#88ccff;}
.stok.c{background:#0a1a0a;color:#88ff88;}
.stok.a{color:#333;}

/* ── NUMPAD: two blocks side by side ── */
.np-area{display:flex;gap:6px;}

/* left numpad block */
.np-left{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;flex:1;}
/* right numpad block */
.np-right{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;flex:1;}

.nk{
  background:var(--sw-bg);border:1px solid #1a1a1a;border-radius:3px;
  padding:7px 3px;font-family:var(--mono);font-size:.62rem;color:var(--sw-txt);
  cursor:pointer;text-align:center;transition:background .07s;
  user-select:none;line-height:1.2;
}
.nk:active,.nk.pr{background:#1a2030;}
.nk.cm {color:var(--sw-txt);}
.nk.cg {color:var(--sw-txt);}
.nk.cr {color:var(--sw-txt);}
.nk.cl {color:var(--sw-txt);}
.nk.w2 {grid-column:span 2;}
.nk.w3 {grid-column:span 3;}

/* Master fader row inside cmd-side */
.master-row-inline{display:flex;align-items:center;gap:5px;margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,.15);}
.mtrack{flex:1;height:10px;background:var(--sw-bg);border:1px solid #222;border-radius:5px;position:relative;overflow:hidden;}
.mfill{height:100%;background:linear-gradient(to right,#c07010,#ffdd55);border-radius:5px;transition:width .04s;}
input#msl{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;}
.mlbl{font-family:var(--mono);font-size:.52rem;color:var(--sw-bg);opacity:.5;}
.mval{font-family:var(--mono);font-size:.6rem;color:var(--sw-bg);width:24px;text-align:right;}

.qrow{display:flex;gap:4px;margin-top:4px;}
.qbtn{flex:1;font-family:var(--mono);font-size:.52rem;padding:5px 2px;border-radius:3px;cursor:pointer;text-align:center;transition:all .1s;border:none;letter-spacing:.05em;}
.qbtn.bo{background:#1a0000;color:var(--bo-col);border:1px solid #4a1010;}
.qbtn.bo:hover,.qbtn.bo.on{background:#380808;box-shadow:0 0 8px rgba(243,63,63,.4);}
.qbtn.ao{background:#001a00;color:var(--ok-col);border:1px solid #104010;}
.qbtn.ao:hover{background:#082808;box-shadow:0 0 8px rgba(76,198,78,.35);}

/* ── FADER GROUPS ── */
.frow{display:flex;gap:4px;flex-wrap:wrap;align-items:flex-end;}

.grpb{background:rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.14);border-radius:3px;padding:5px 5px 4px;}
/* inactive group: visible but NOT pointer-events:none — sliders move but do nothing */
.grpb.off{opacity:.35;}
.grpnm{font-family:var(--mono);font-size:.46rem;color:var(--sw-bg);opacity:.45;margin-bottom:3px;letter-spacing:.06em;}
.grps{display:flex;gap:4px;}

.fstrip{display:flex;flex-direction:column;align-items:center;gap:2px;width:33px;}
.fnum{font-family:var(--mono);font-size:.46rem;color:var(--sw-bg);opacity:.55;}

.sl-row{display:flex;align-items:center;gap:2px;}
.sl-wrap{position:relative;width:11px;height:58px;background:var(--sw-bg);border:1px solid #1a1a1a;border-radius:5px;overflow:hidden;}
.sl-fill{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(to top,#c07010,#ffdd55);border-radius:0 0 5px 5px;transition:height .04s;}
input.vsl{-webkit-appearance:slider-vertical;appearance:slider-vertical;writing-mode:vertical-lr;direction:rtl;position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:3;}
/* inactive slider: still movable but fill stays grey */
.grpb.off .sl-fill{background:linear-gradient(to top,#3a3a3a,#666) !important;}

.sl-scale{display:flex;flex-direction:column;justify-content:space-between;height:58px;pointer-events:none;}
.sl-scale span{font-family:var(--mono);font-size:.34rem;color:var(--sw-txt);opacity:.4;line-height:1;}

/* single hold-blackout button */
.sw{
  width:23px;height:16px;
  background:var(--sw-bg);border:1px solid #333;border-radius:2px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .07s;user-select:none;
}
.sw-dot{width:6px;height:6px;border-radius:50%;background:#555;}
.sw.held{background:#1a0808;border-color:var(--bo-col);box-shadow:0 0 6px var(--bo-col);}
.sw.held .sw-dot{background:var(--bo-col);}

.fpct{font-family:var(--mono);font-size:.42rem;color:var(--sw-bg);opacity:.45;min-width:23px;text-align:center;}
.fpct.on{opacity:1;font-weight:700;}

/* ── STATUS ── */
.status{width:100%;max-width:1380px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:.52rem;color:#3a3a3a;padding-top:4px;border-top:1px solid #1e1e1e;}
#ltxt{max-width:72%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* seq flash */
@keyframes bok{0%{background:#002800}100%{background:#000}}
@keyframes ber{0%{background:#280000}100%{background:#000}}
.cmd-bar.ok{animation:bok .35s ease-out;}
.cmd-bar.er{animation:ber .35s ease-out;}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">照明練習ツール</span>
  <span class="hdr-badge">ETC Element 2</span>
  <span class="hdr-badge g">Training Mode</span>
  <span class="hdr-badge" style="margin-left:auto;">Lighting Simulator beta4.1.1</span>
</div>

<!-- STAGE -->
<div class="stage-section">
  <div class="sec-lbl">▶ ステージ 真上 — Top View</div>
  <div class="stage-layout">
    <div class="s-top"  id="s-top"></div>
    <div class="s-left" id="s-left"></div>
    <div class="s-mid"><canvas id="stage-canvas"></canvas></div>
    <div class="s-right"id="s-right"></div>
    <div class="s-bot"  id="s-bot"></div>
  </div>
</div>

<!-- UNIFIED CONTROL PANEL -->
<div class="ctrl-panel">
  <div class="panel-nm">Element 2</div>
  <div class="panel-inner">

    <!-- LEFT: fader strips -->
    <div class="fader-side" id="fader-side"></div>

    <!-- RIGHT: command keys + master (same panel frame) -->
    <div class="cmd-side">
      <div style="font-family:var(--mono);font-size:.52rem;color:var(--sw-bg);opacity:.4;letter-spacing:.15em;text-align:center;margin-bottom:3px;">COMMAND KEYS</div>

      <!-- Command viewer directly above numpad -->
      <div class="cmd-bar" id="cmdbar"><span class="ph">— コマンドを入力 —</span></div>

      <!-- Two numpad blocks side by side -->
      <div class="np-area">
        <!-- Left numpad: numeric + basic commands -->
        <div class="np-left" id="np-left">
          <div class="nk" data-k="+">+</div>
          <div class="nk" data-k="Thru">Thru</div>
          <div class="nk" data-k="-">−</div>
          <div class="nk" data-k="7">7</div>
          <div class="nk" data-k="8">8</div>
          <div class="nk" data-k="9">9</div>
          <div class="nk" data-k="4">4</div>
          <div class="nk" data-k="5">5</div>
          <div class="nk" data-k="6">6</div>
          <div class="nk" data-k="1">1</div>
          <div class="nk" data-k="2">2</div>
          <div class="nk" data-k="3">3</div>
          <div class="nk" data-k="Clear">Clear</div>
          <div class="nk" data-k="0">0</div>
          <div class="nk" data-k=",">,</div>
        </div>

        <!-- Right numpad: command keys (layout per design image) -->
        <div class="np-right" id="np-right">
          <!-- row 1: / | Mark | Sneak -->
          <div class="nk" data-k="/">/</div>
          <div class="nk" data-k="Mark">Mark</div>
          <div class="nk" data-k="Sneak">Sneak</div>
          <!-- row 2: RemDim | +% | Home -->
          <div class="nk" data-k="RemDim" style="font-size:.5rem">Rem<br>Dim</div>
          <div class="nk" data-k="+%">+ %</div>
          <div class="nk" data-k="Home">Home</div>
          <!-- row 3: Out | -% | Trace -->
          <div class="nk" data-k="Out">Out</div>
          <div class="nk" data-k="-%">− %</div>
          <div class="nk" data-k="Trace">Trace</div>
          <!-- row 4: Full | Level | QOnly -->
          <div class="nk" data-k="Full">Full</div>
          <div class="nk" data-k="Level">Level</div>
          <div class="nk" data-k="QOnly" style="font-size:.46rem">Q Only<br>Track</div>
          <!-- row 5: At | Enter (span 2) -->
          <div class="nk" data-k="At">At</div>
          <div class="nk w2" data-k="Enter">Enter ↵</div>
        </div>
      </div>

      <!-- Master fader inside same box -->
      <div class="master-row-inline">
        <span class="mlbl">Out</span>
        <div class="mtrack">
          <div class="mfill" id="mfill" style="width:100%"></div>
          <input type="range" id="msl" min="0" max="100" value="100">
        </div>
        <span class="mlbl">Full</span>
        <div class="mval" id="mval">FL</div>
      </div>
      <div class="qrow">
        <button class="qbtn bo" id="qbo">■ BLACKOUT</button>
        <button class="qbtn ao" id="qao">▲ ALL FULL</button>
      </div>
    </div>

  </div>
</div>

<div class="status"><div id="ltxt">LIVE: —</div><div>Chan 1–56 @ Simulator v4.1</div></div>

<script>
// ── CHANNEL DATA ──
const CD = {
  1: {type:'front',sx:.08,ey:.52,col:'#ffe890'},
  2: {type:'front',sx:.25,ey:.52,col:'#ffe890'},
  3: {type:'front',sx:.50,ey:.52,col:'#ffe890'},
  4: {type:'front',sx:.73,ey:.52,col:'#ffe890'},
  5: {type:'front',sx:.92,ey:.52,col:'#ffe890'},
  6: {type:'back', sx:.08,ey:.16,col:'#ffd070'},
  8: {type:'back', sx:.38,ey:.16,col:'#ffd070'},
  9: {type:'back', sx:.62,ey:.16,col:'#ffd070'},
  10:{type:'back', sx:.92,ey:.16,col:'#ffd070'},
  11:{type:'side-l',row:.88,col:'#aaccff'},
  12:{type:'side-l',row:.76,col:'#aaccff'},
  21:{type:'side-l',row:.56,col:'#bbddff'},
  22:{type:'side-l',row:.46,col:'#bbddff'},
  31:{type:'side-l',row:.28,col:'#ccccff'},
  32:{type:'side-l',row:.18,col:'#ccccff'},
  13:{type:'side-r',row:.88,col:'#aaccff'},
  14:{type:'side-r',row:.76,col:'#aaccff'},
  23:{type:'side-r',row:.56,col:'#bbddff'},
  24:{type:'side-r',row:.46,col:'#bbddff'},
  33:{type:'side-r',row:.28,col:'#ccccff'},
  34:{type:'side-r',row:.18,col:'#ccccff'},
  41:{type:'top',sx:.08,sy:.72,r:44,col:'#ffffff'},
  42:{type:'top',sx:.22,sy:.72,r:44,col:'#ffffff'},
  43:{type:'top',sx:.38,sy:.72,r:44,col:'#ffffff'},
  44:{type:'top',sx:.62,sy:.72,r:44,col:'#ffffff'},
  45:{type:'top',sx:.78,sy:.72,r:44,col:'#ffffff'},
  46:{type:'top',sx:.92,sy:.72,r:44,col:'#ffffff'},
  51:{type:'top',sx:.08,sy:.30,r:44,col:'#ffffff'},
  52:{type:'top',sx:.22,sy:.30,r:44,col:'#ffffff'},
  53:{type:'top',sx:.38,sy:.30,r:44,col:'#ffffff'},
  54:{type:'top',sx:.62,sy:.30,r:44,col:'#ffffff'},
  55:{type:'top',sx:.78,sy:.30,r:44,col:'#ffffff'},
  56:{type:'top',sx:.92,sy:.30,r:44,col:'#ffffff'},
};
const ACTIVE_IDS = Object.keys(CD).map(Number);

// Panel groups: active=true channels respond to sliders; active=false = decorative
// ALL slots shown as physical faders, just inactive ones don't affect stage
const PG = [
  // Row 1: ch 1-20
  [
    {lbl:'Ch 1–5',   ids:[1,2,3,4,5],       active:true },
    {lbl:'Ch 6–10',  ids:[6,7,8,9,10],       active:true, specialInactive:[7] }, // 7 is decorative
    {lbl:'Ch 11–14', ids:[11,12,13,14],       active:true },
    {lbl:'Ch 15–20', ids:[15,16,17,18,19,20], active:false},
  ],
  // Row 2: ch 21-40
  [
    {lbl:'Ch 21–24', ids:[21,22,23,24],       active:true },
    {lbl:'Ch 25–30', ids:[25,26,27,28,29,30], active:false},
    {lbl:'Ch 31–34', ids:[31,32,33,34],       active:true },
    {lbl:'Ch 35–40', ids:[35,36,37,38,39,40], active:false},
  ],
  // Row 3: ch 41-56
  [
    {lbl:'Ch 41–46', ids:[41,42,43,44,45,46], active:true },
    {lbl:'Ch 51–56', ids:[51,52,53,54,55,56], active:true },
  ],
];

// State: only active channels have real effect
const ST = {};
for(let i=1;i<=60;i++) ST[i]=0;

let MLV=100, BO=false;

// Which channels are truly "wired" (affect stage)
function isWired(id){ return ACTIVE_IDS.includes(id); }

// ── CANVAS ──
const cv=document.getElementById('stage-canvas'), ctx=cv.getContext('2d');
function resize(){
  const r=cv.parentElement.getBoundingClientRect();
  cv.width=r.width*devicePixelRatio; cv.height=r.height*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio); draw();
}
function hr(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function ef(id){return BO?0:(ST[id]/100)*(MLV/100);}

function draw(){
  const W=cv.width/devicePixelRatio, H=cv.height/devicePixelRatio;
  ctx.fillStyle='#050508'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#0a0a0e'; ctx.lineWidth=.4;
  for(let i=1;i<22;i++){ctx.beginPath();ctx.moveTo(0,H/22*i);ctx.lineTo(W,H/22*i);ctx.stroke();}
  ctx.strokeStyle='#161620'; ctx.lineWidth=1.2; ctx.strokeRect(1,1,W-2,H-2);
  ctx.font='9px Share Tech Mono,monospace'; ctx.fillStyle='#1e1e24';
  ctx.fillText('Back / 奥',5,13); ctx.fillText('Front / 手前',5,H-3);
  ctx.fillText('SL',5,H/2+4); ctx.textAlign='right'; ctx.fillText('SR',W-5,H/2+4); ctx.textAlign='left';

  ctx.globalCompositeOperation='screen';
  ACTIVE_IDS.forEach(id=>{
    const v=ef(id); if(v<=0) return;
    const d=CD[id]; const {r:R,g:G,b:B}=hr(d.col);

    if(d.type==='front'||d.type==='back'){
      const tx=d.sx*W, topY=d.ey*H, botY=H+10;
      // Wider spread for front lights
      const spreadMult = d.type==='front' ? 0.72 : 0.60;
      const spread=(botY-topY)*spreadMult*v;
      const grd=ctx.createLinearGradient(tx,botY,tx,topY);
      grd.addColorStop(0,`rgba(${R},${G},${B},0)`);
      grd.addColorStop(.2,`rgba(${R},${G},${B},${v*.55})`);
      grd.addColorStop(1,`rgba(${R},${G},${B},0)`);
      ctx.save(); ctx.beginPath();
      ctx.moveTo(tx-4,botY); ctx.lineTo(tx-spread,topY); ctx.lineTo(tx+spread,topY); ctx.lineTo(tx+4,botY);
      ctx.closePath(); ctx.fillStyle=grd; ctx.fill();

    } else if(d.type==='side-l'){
      const sy=d.row*H, len=W*.60*(0.45+v*.55), sp=len*.42;
      const grd=ctx.createLinearGradient(0,sy,len,sy);
      grd.addColorStop(0,`rgba(${R},${G},${B},${v*.72})`);
      grd.addColorStop(.55,`rgba(${R},${G},${B},${v*.28})`);
      grd.addColorStop(1,`rgba(${R},${G},${B},0)`);
      ctx.save(); ctx.beginPath();
      ctx.moveTo(0,sy); ctx.lineTo(len,sy-sp); ctx.lineTo(len,sy+sp); ctx.closePath();
      ctx.fillStyle=grd; ctx.fill(); ctx.restore();

    } else if(d.type==='side-r'){
      const sy=d.row*H, len=W*.60*(0.45+v*.55), sp=len*.42;
      const grd=ctx.createLinearGradient(W,sy,W-len,sy);
      grd.addColorStop(0,`rgba(${R},${G},${B},${v*.72})`);
      grd.addColorStop(.55,`rgba(${R},${G},${B},${v*.28})`);
      grd.addColorStop(1,`rgba(${R},${G},${B},0)`);
      ctx.save(); ctx.beginPath();
      ctx.moveTo(W,sy); ctx.lineTo(W-len,sy-sp); ctx.lineTo(W-len,sy+sp); ctx.closePath();
      ctx.fillStyle=grd; ctx.fill(); ctx.restore();

    } else if(d.type==='top'){
      const cx=d.sx*W, cy=d.sy*H, rad=d.r*(0.4+v*.7);
      const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
      grd.addColorStop(0,`rgba(${R},${G},${B},${v*.9})`);
      grd.addColorStop(.35,`rgba(${R},${G},${B},${v*.5})`);
      grd.addColorStop(.7,`rgba(${R},${G},${B},${v*.15})`);
      grd.addColorStop(1,`rgba(${R},${G},${B},0)`);
      ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
      const core=ctx.createRadialGradient(cx,cy,0,cx,cy,rad*.18);
      core.addColorStop(0,`rgba(255,255,255,${v*.8})`);
      core.addColorStop(1,`rgba(${R},${G},${B},0)`);
      ctx.beginPath(); ctx.arc(cx,cy,rad*.18,0,Math.PI*2); ctx.fillStyle=core; ctx.fill();
    }
  });
  ctx.globalCompositeOperation='source-over';

  // top-spot markers
  [41,42,43,44,45,46,51,52,53,54,55,56].forEach(id=>{
    const d=CD[id],v=ef(id),cx=d.sx*W,cy=d.sy*H;
    ctx.beginPath(); ctx.arc(cx,cy,4.5,0,Math.PI*2);
    ctx.fillStyle=v>0?'#555':'#141414'; ctx.fill();
    ctx.strokeStyle=v>0?'#888':'#222'; ctx.lineWidth=.6; ctx.stroke();
    ctx.font='6.5px Share Tech Mono,monospace';
    ctx.fillStyle=v>0?'#aaa':'#222'; ctx.textAlign='center';
    ctx.fillText(id,cx,cy-6); ctx.textAlign='left';
  });
}

// ── STAGE MAP DOTS ──
function dot(id){
  const el=document.createElement('div'); el.className='fdot'; el.id='d'+id; el.textContent=id; return el;
}
function buildMap(){
  const top=document.getElementById('s-top');
  const tw=document.createElement('div'); tw.style.cssText='display:flex;flex-direction:column;gap:2px;align-items:center;';
  const r5=document.createElement('div');r5.style.cssText='display:flex;gap:3px;';
  [51,52,53,54,55,56].forEach(id=>r5.appendChild(dot(id)));
  const r4=document.createElement('div');r4.style.cssText='display:flex;gap:3px;';
  [41,42,43,44,45,46].forEach(id=>r4.appendChild(dot(id)));
  tw.appendChild(r5);tw.appendChild(r4);top.appendChild(tw);

  const left=document.getElementById('s-left');
  [[31,32],[21,22],[11,12]].forEach(p=>{const row=document.createElement('div');row.className='side-pair';p.forEach(id=>row.appendChild(dot(id)));left.appendChild(row);});

  const right=document.getElementById('s-right');
  [[33,34],[23,24],[13,14]].forEach(p=>{const row=document.createElement('div');row.className='side-pair';p.forEach(id=>row.appendChild(dot(id)));right.appendChild(row);});

  const bot=document.getElementById('s-bot');
  const bw=document.createElement('div');bw.style.cssText='display:flex;flex-direction:column;gap:2px;align-items:center;';
  const rb=document.createElement('div');rb.style.cssText='display:flex;gap:3px;align-items:center;';
  [6,null,8,9,10].forEach(id=>{
    if(!id){const sp=document.createElement('div');sp.style.width='25px';rb.appendChild(sp);return;}
    rb.appendChild(dot(id));
  });
  const ra=document.createElement('div');ra.style.cssText='display:flex;gap:3px;';
  [1,2,3,4,5].forEach(id=>ra.appendChild(dot(id)));
  bw.appendChild(rb);bw.appendChild(ra);bot.appendChild(bw);
}
function updDot(id){
  const el=document.getElementById('d'+id); if(!el) return;
  const v=ef(id); const d=CD[id];
  el.classList.remove('lit','lit-w','lit-s');
  if(v>0){
    if(d.type==='top') el.classList.add('lit-w');
    else if(d.type==='side-l'||d.type==='side-r') el.classList.add('lit-s');
    else el.classList.add('lit');
  }
}

// ── FADER PANEL ──
function buildPanel(){
  const root=document.getElementById('fader-side');
  PG.forEach(row=>{
    const re=document.createElement('div');re.className='frow';
    row.forEach(g=>{
      const gb=document.createElement('div');
      gb.className='grpb'+(g.active?'':' off');
      const gl=document.createElement('div');gl.className='grpnm';gl.textContent=g.lbl;gb.appendChild(gl);
      const gs=document.createElement('div');gs.className='grps';
      g.ids.forEach(id=>{
        // specialInactive: within an active group, some slots are decorative (e.g. ch7)
        const dec = !g.active || (g.specialInactive && g.specialInactive.includes(id));
        gs.appendChild(mkStrip(id, dec));
      });
      gb.appendChild(gs);re.appendChild(gb);
    });
    root.appendChild(re);
  });
}

function mkStrip(id, decorative){
  const s=document.createElement('div');s.className='fstrip';s.id='fs'+id;
  if(decorative) s.dataset.decorative='1';

  const num=document.createElement('div');num.className='fnum';num.textContent=id;

  const slr=document.createElement('div');slr.className='sl-row';
  const slw=document.createElement('div');slw.className='sl-wrap';
  const slf=document.createElement('div');slf.className='sl-fill';slf.id='sf'+id;slf.style.height='0%';
  const sli=document.createElement('input');sli.type='range';sli.className='vsl';
  sli.min=0;sli.max=100;sli.value=0;sli.id='sl'+id;
  sli.addEventListener('input',()=>{
    // Decorative: fill moves but nothing happens on stage
    if(decorative){
      slf.style.height=sli.value+'%';
      // pct label still updates (makes it feel real)
      const p=document.getElementById('pc'+id);
      if(p){p.textContent=+sli.value===100?'FL':(+sli.value>0?sli.value:'0');}
      return;
    }
    setCh(id,+sli.value);
  });
  slw.appendChild(slf);slw.appendChild(sli);
  const sc=document.createElement('div');sc.className='sl-scale';
  ['FL','50','0'].forEach(t=>{const sp=document.createElement('span');sp.textContent=t;sc.appendChild(sp);});
  slr.appendChild(slw);slr.appendChild(sc);

  // Single hold-blackout switch: holds mute the channel while pressed
  const sw=document.createElement('div');sw.className='sw';sw.title='押している間だけ暗転';
  const dot=document.createElement('div');dot.className='sw-dot';sw.appendChild(dot);
  if(!decorative){
    // store the level before hold so we can restore it
    sw.addEventListener('mousedown',()=>{
      sw._prev=ST[id];
      sw.classList.add('held');
      setCh(id,0);
    });
    const release=()=>{
      if(!sw.classList.contains('held')) return;
      sw.classList.remove('held');
      const restore=sw._prev||0;
      setCh(id,restore);
    };
    sw.addEventListener('mouseup',release);
    sw.addEventListener('mouseleave',release);
    // touch support
    sw.addEventListener('touchstart',e=>{e.preventDefault();sw._prev=ST[id];sw.classList.add('held');setCh(id,0);},{passive:false});
    sw.addEventListener('touchend',release);
  }

  const pct=document.createElement('div');pct.className='fpct';pct.id='pc'+id;pct.textContent='0';
  s.appendChild(num);s.appendChild(slr);s.appendChild(sw);s.appendChild(pct);
  return s;
}

// ── STATE ──
function setCh(id,val){
  ST[id]=val; updUI(id); updDot(id); draw(); updLive();
}
function updUI(id){
  const v=ST[id];
  const f=document.getElementById('sf'+id);if(f)f.style.height=v+'%';
  const p=document.getElementById('pc'+id);
  if(p){p.textContent=v===100?'FL':(v>0?v:'0');v>0?p.classList.add('on'):p.classList.remove('on');}
}
function setAll(val){
  ACTIVE_IDS.forEach(id=>{ST[id]=val;updUI(id);updDot(id);const s=document.getElementById('sl'+id);if(s)s.value=val;});
  draw();updLive();
}
function updLive(){
  const on=ACTIVE_IDS.filter(id=>ST[id]>0);
  document.getElementById('ltxt').textContent=on.length===0?'LIVE: —':'LIVE: '+on.map(id=>`Ch${id}@${ST[id]===100?'FL':ST[id]+'%'}`).join('  ');
}

// ── COMMAND KEYS ──
let seq=[];
const bar=document.getElementById('cmdbar');
function rBar(){
  if(!seq.length){bar.innerHTML='<span class="ph">— コマンドを入力 —</span>';return;}
  bar.innerHTML=seq.map((t,i)=>{
    const c=isNaN(t)&&t!==','?'c':'n';
    return `<span class="stok ${c}">${t}</span>`+(i<seq.length-1?'<span class="stok a">›</span>':'');
  }).join('');
}
function push(t){
  if(!isNaN(t)&&t!==''&&seq.length>0&&!isNaN(seq[seq.length-1]))seq[seq.length-1]+=t;
  else seq.push(t); rBar();
}
function exec(){
  const s=[...seq];let ids=[],cmd=null,lvl=null,i=0;
  while(i<s.length){
    const t=s[i];
    if(!isNaN(t)&&t!==''){
      const n=parseInt(t);
      if(s[i+1]==='Thru'&&s[i+2]&&!isNaN(s[i+2])){
        const e=parseInt(s[i+2]);
        for(let c=Math.min(n,e);c<=Math.max(n,e);c++)ids.push(c);
        i+=3;
      }else{ids.push(n);i++;}
    }else if(t===','){i++;}
    else{cmd=t;if(s[i+1]&&!isNaN(s[i+1]))lvl=parseInt(s[i+1]);break;}
  }
  ids=ids.filter(id=>ACTIVE_IDS.includes(id));
  let ok=false;
  const doF=()=>{ids.forEach(id=>{ST[id]=100;updUI(id);updDot(id);const sl=document.getElementById('sl'+id);if(sl)sl.value=100;});draw();updLive();ok=true;};
  const doO=()=>{ids.forEach(id=>{ST[id]=0;updUI(id);updDot(id);const sl=document.getElementById('sl'+id);if(sl)sl.value=0;});draw();updLive();ok=true;};
  if(cmd==='Full'||(cmd==='Enter'&&s.includes('Full')))doF();
  else if(cmd==='Out'||(cmd==='Enter'&&s.includes('Out')))doO();
  else if((cmd==='At'||cmd==='Level')&&lvl!==null){
    ids.forEach(id=>{ST[id]=Math.min(100,Math.max(0,lvl));updUI(id);updDot(id);const sl=document.getElementById('sl'+id);if(sl)sl.value=ST[id];});
    draw();updLive();ok=true;
  }else if(cmd==='Enter'){if(s.includes('Full'))doF();else if(s.includes('Out'))doO();}
  bar.classList.remove('ok','er'); void bar.offsetWidth;
  bar.classList.add(ok?'ok':'er');
  setTimeout(()=>bar.classList.remove('ok','er'),400);
  seq=[];rBar();
}

// Numpad click handler for both blocks
['np-left','np-right'].forEach(npId=>{
  document.getElementById(npId).addEventListener('click',e=>{
    const k=e.target.closest('.nk');if(!k)return;
    const v=k.dataset.k;
    k.classList.add('pr');setTimeout(()=>k.classList.remove('pr'),120);
    if(v==='Clear'){seq=[];rBar();return;}
    if(v==='Enter'){exec();return;}
    if(v==='Out'){push('Out');exec();return;}
    push(v);
  });
});

// Master
document.getElementById('msl').addEventListener('input',function(){
  MLV=+this.value;
  document.getElementById('mfill').style.width=MLV+'%';
  document.getElementById('mval').textContent=MLV===100?'FL':MLV;
  ACTIVE_IDS.forEach(id=>updDot(id)); draw();
});
document.getElementById('qbo').addEventListener('click',()=>{
  BO=!BO; document.getElementById('qbo').classList.toggle('on',BO);
  ACTIVE_IDS.forEach(id=>updDot(id)); draw();
});
document.getElementById('qao').addEventListener('click',()=>{
  BO=false; document.getElementById('qbo').classList.remove('on'); setAll(100);
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.key==='Backspace'){seq.pop();rBar();}
  else if(e.key==='Escape'){seq=[];rBar();}
  else if(e.key==='Enter')exec();
  else if(/^\d$/.test(e.key))push(e.key);
});

// INIT
buildMap();
buildPanel();
new ResizeObserver(resize).observe(document.getElementById('stage-canvas').parentElement);
</script>
